<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор сложного процента</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <!-- Скрытие полосы прокрутки у таблицы (в Tailwind нет из коробки). -->
  <style type="text/tailwindcss">
    @layer utilities {
      .scrollbar-hide { scrollbar-width: none; -ms-overflow-style: none; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
    }
  </style>
  <!-- Кнопки шага у number-инпутов — всегда видимые (в WebKit по умолчанию появляются только при наведении). -->
  <style>
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: inner-spin-button;
      opacity: 1;
    }
  </style>
</head>
<body class="bg-[#F4F4F9] text-[#111]">
  <div id="app" class="p-3 sm:p-6">
    <div class="mx-auto max-w-[800px] flex flex-col gap-2 sm:gap-4">
    <!-- Карточка с заголовком и фильтрами -->
    <div class="bg-white rounded-2xl p-3 sm:p-5">
    <h1 class="mb-2.5 sm:mb-5 text-2xl font-bold">Калькулятор сложного процента</h1>

    <!-- Панель управления: группа полей + группа «radio + кнопка» в одной переносимой строке -->
    <div class="text-sm flex flex-col gap-2 sm:flex-row sm:flex-wrap sm:items-start sm:gap-6">
      <!-- группа полей 2×2 -->
      <div class="flex flex-wrap items-start gap-2 sm:gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold" for="initial">Начальная сумма</label>
          <input id="initial" type="text" inputmode="decimal"
                 class="h-8 sm:h-10 w-[130px] rounded-lg px-2 bg-white text-[#111] outline-none"
                 :class="showErrors && errors.initial ? 'border border-[#e02424]' : 'border-[0.5px] border-black/35 focus:border-black/60'"
                 :value="displayValue('initial')" @focus="onFocus('initial')" @blur="onBlur('initial')"
                 @keydown="blockKey($event, false)" @input="onInput($event, 'initial', false, 1000000000)" />
          <div class="text-xs text-[#e02424] mt-1" v-if="showErrors && errors.initial">{{ errors.initial }}</div>
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold" for="contribution">Сумма пополнения</label>
          <input id="contribution" type="text" inputmode="decimal"
                 class="h-8 sm:h-10 w-[130px] rounded-lg px-2 bg-white text-[#111] outline-none"
                 :class="showErrors && errors.contribution ? 'border border-[#e02424]' : 'border-[0.5px] border-black/35 focus:border-black/60'"
                 :value="displayValue('contribution')" @focus="onFocus('contribution')" @blur="onBlur('contribution')"
                 @keydown="blockKey($event, false)" @input="onInput($event, 'contribution', false, 1000000000)" />
          <div class="text-xs text-[#e02424] mt-1" v-if="showErrors && errors.contribution">{{ errors.contribution }}</div>
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold" for="rate">Ставка, %</label>
          <input id="rate" type="number" inputmode="decimal" min="0" max="999.99" step="0.1"
                 class="h-8 sm:h-10 w-20 rounded-lg px-2 bg-white text-[#111] outline-none"
                 :class="showErrors && errors.ratePercent ? 'border border-[#e02424]' : 'border-[0.5px] border-black/35 focus:border-black/60'"
                 :value="ratePercent"
                 @keydown="blockKey($event, false)" @input="onInput($event, 'ratePercent', false, 999.99)" />
          <div class="text-xs text-[#e02424] mt-1" v-if="showErrors && errors.ratePercent">{{ errors.ratePercent }}</div>
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold" for="years">Срок, лет</label>
          <input id="years" type="number" inputmode="numeric" min="1" max="100" step="1"
                 class="h-8 sm:h-10 w-20 rounded-lg px-2 bg-white text-[#111] outline-none"
                 :class="showErrors && errors.years ? 'border border-[#e02424]' : 'border-[0.5px] border-black/35 focus:border-black/60'"
                 :value="years"
                 @keydown="blockKey($event, true)" @input="onInput($event, 'years', true, 100)" />
          <div class="text-xs text-[#e02424] mt-1" v-if="showErrors && errors.years">{{ errors.years }}</div>
        </div>
      </div>

      <!-- группа «radio + кнопка» -->
      <div class="flex flex-col flex-wrap gap-2 sm:flex-row sm:grow sm:items-start sm:gap-6">
        <div class="flex flex-row flex-wrap gap-6">
          <div class="flex flex-col gap-1">
            <span class="font-bold">Пополнения</span>
            <label class="flex items-center gap-1.5"><input type="radio" value="monthly" v-model="contributionFreq" /> Ежемесячно</label>
            <label class="flex items-center gap-1.5"><input type="radio" value="yearly" v-model="contributionFreq" /> Ежегодно</label>
          </div>
          <div class="flex flex-col gap-1">
            <span class="font-bold">Капитализация</span>
            <label class="flex items-center gap-1.5"><input type="radio" value="semiannual" v-model="compounding" /> Раз в полгода</label>
            <label class="flex items-center gap-1.5"><input type="radio" value="yearly" v-model="compounding" /> Ежегодно</label>
          </div>
        </div>
        <button class="h-8 sm:h-10 w-[170px] px-[18px] bg-[#111] text-white rounded-lg font-medium active:scale-[0.98] cursor-pointer" @click="calculate">Рассчитать</button>
      </div>
    </div>
    </div>

    <!-- Карточка с таблицей результатов -->
    <div class="bg-white rounded-2xl p-3 sm:p-5">
    <!-- обёртка таблицы: горизонтальная прокрутка, полоса скрыта -->
    <div class="overflow-x-auto -mr-3 pr-3 scrollbar-hide sm:mr-0 sm:pr-0">
      <table class="w-full text-sm border-separate border-spacing-0">
        <thead>
          <tr class="font-bold">
            <th v-for="h in headers" :key="h" class="px-2 sm:px-2.5 py-1.5 sm:py-3 bg-[#80808038] text-left whitespace-nowrap first:rounded-l-lg last:rounded-r-lg first:sticky first:left-0 first:z-10 first:bg-[#E3E3E3]">{{ h }}</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="row in rows" :key="row.year" class="even:bg-[#8080801A]">
            <td class="sticky left-0 z-10 px-2 sm:px-2.5 py-1.5 sm:py-3 whitespace-nowrap" :class="row.year % 2 === 0 ? 'bg-[#F2F2F2]' : 'bg-white'">{{ row.year }}</td>
            <td class="px-2 sm:px-2.5 py-1.5 sm:py-3 whitespace-nowrap">{{ fmt(row.contribThisYear) }}</td>
            <td class="px-2 sm:px-2.5 py-1.5 sm:py-3 whitespace-nowrap">{{ fmt(row.baseBeforeInterest) }}</td>
            <td class="px-2 sm:px-2.5 py-1.5 sm:py-3 whitespace-nowrap">{{ fmt(row.interestThisYear) }}</td>
            <td class="px-2 sm:px-2.5 py-1.5 sm:py-3 whitespace-nowrap">{{ fmt(row.balance) }}</td>
          </tr>
        </tbody>
      </table>
    </div>
    </div>
    </div>
  </div>

  <script>
    const { createApp, ref, computed } = Vue;

    createApp({
      setup() {
        // Поля — строки, чтобы отличать "пусто" от 0. Дефолтов нет.
        const initial = ref('');
        const contribution = ref('');
        const ratePercent = ref('');
        const years = ref('');
        const contributionFreq = ref('monthly');   // monthly | yearly
        const compounding = ref('yearly');          // semiannual | yearly

        const showErrors = ref(false);
        const rows = ref([]);
        const focusedKey = ref(null); // какое поле сейчас редактируется

        const refs = { initial, contribution, ratePercent, years };

        // Числовой форматтер: разряды + 2 знака после запятой, без символа валюты.
        const numFmt = new Intl.NumberFormat('ru-RU', {
          minimumFractionDigits: 2, maximumFractionDigits: 2
        });

        // Что показывать в поле: при фокусе — «сырое» значение, иначе — форматированное.
        const displayValue = (key) => {
          const raw = refs[key].value;
          if (focusedKey.value === key) return raw;
          if (raw === '') return '';
          const n = Number(raw);
          if (isNaN(n)) return raw;
          if (key === 'initial' || key === 'contribution') return numFmt.format(n);
          if (key === 'ratePercent') return numFmt.format(n);
          if (key === 'years') return String(Math.floor(n)); // срок — целое
          return raw;
        };

        const onFocus = (key) => { focusedKey.value = key; };
        const onBlur = (key) => {
          let raw = refs[key].value;
          if (raw === '.' || raw === '') raw = ''; // незавершённый ввод
          refs[key].value = raw;
          focusedKey.value = null;
        };

        // Обработка клавиш: Enter запускает расчёт; запрет '-', '+', 'e'; для
        // целого поля ещё '.' и ','.
        const blockKey = (e, intOnly) => {
          if (e.key === 'Enter') { e.target.blur(); calculate(); return; }
          const blocked = ['-', '+', 'e', 'E'];
          if (intOnly) blocked.push('.', ',');
          if (blocked.includes(e.key)) e.preventDefault();
        };

        // Санитизация: оставляем только цифры (и одну дес. точку для сумм/ставки).
        // max — необязательный верхний предел: значение больше него заменяется на него.
        const onInput = (e, key, intOnly, max) => {
          let v = e.target.value;
          if (intOnly) {
            v = v.replace(/[^\d]/g, '');
          } else {
            v = v.replace(',', '.').replace(/[^\d.]/g, '');
            const parts = v.split('.');
            if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
          }
          if (max != null && v !== '' && !isNaN(Number(v)) && Number(v) > max) {
            v = String(max);
          }
          refs[key].value = v;
          if (e.target.value !== v) e.target.value = v;
        };

        const errors = computed(() => {
          const e = { initial: null, contribution: null, ratePercent: null, years: null };
          if (initial.value === '') e.initial = 'Заполните поле';
          if (contribution.value === '') e.contribution = 'Заполните поле';
          if (ratePercent.value === '') e.ratePercent = 'Заполните поле';
          if (years.value === '') {
            e.years = 'Заполните поле';
          } else {
            const y = Number(years.value);
            if (!Number.isInteger(y) || y < 1 || y > 100) e.years = 'Введите целое число от 1 до 100';
          }
          return e;
        });

        const isValid = computed(() =>
          Object.values(errors.value).every(v => v === null)
        );

        // Заголовки колонок таблицы.
        const headers = computed(() =>
          ['Год', 'Пополнения', 'Баланс', 'Проценты', 'Итого']
        );

        // Округление до сотых (2 знака после запятой).
        const round2 = (x) => Math.round(x * 100) / 100;

        // Помесячная симуляция (12 шагов в году покрывают все комбинации частот).
        const simulate = () => {
          const p0 = Number(initial.value) || 0;
          const contrib = Number(contribution.value) || 0;
          const rate = (Number(ratePercent.value) || 0) / 100;
          const totalYears = Number(years.value) || 0;

          const k = compounding.value === 'semiannual' ? 2 : 1; // капитализаций в год
          const periodRate = rate / k;
          const isCompMonth = (m) => (k === 2 ? (m === 6 || m === 12) : (m === 12));
          const isContribMonth = (m) => (contributionFreq.value === 'monthly' ? true : (m === 12));

          let balance = p0;
          const out = [];
          for (let year = 1; year <= totalYears; year++) {
            const startBalance = balance;
            let interestThisYear = 0;
            let contribThisYear = 0;
            for (let month = 1; month <= 12; month++) {
              // Сначала пополнение, затем (в месяц капитализации) начисление процента.
              if (isContribMonth(month)) { balance += contrib; contribThisYear += contrib; }
              if (isCompMonth(month)) {
                const interest = balance * periodRate;
                balance += interest;
                interestThisYear += interest;
              }
            }
            // Баланс до начисления процентов за год = остаток с прошлого года + пополнения года.
            const baseBeforeInterest = startBalance + contribThisYear;
            // Значения для строки округляем до сотых; внутренний balance остаётся точным.
            out.push({
              year,
              contribThisYear: round2(contribThisYear),
              baseBeforeInterest: round2(baseBeforeInterest),
              interestThisYear: round2(interestThisYear),
              balance: round2(balance)
            });
          }
          return out;
        };

        const calculate = () => {
          showErrors.value = true;
          if (!isValid.value) return; // таблица не пересчитывается
          rows.value = simulate();
        };

        const fmt = (value) => numFmt.format(value);

        return {
          initial, contribution, ratePercent, years,
          contributionFreq, compounding,
          showErrors, rows, errors, isValid, headers,
          displayValue, onFocus, onBlur,
          blockKey, onInput, calculate, fmt
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
